name: Performance Benchmarks

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Pure statistics / gating logic — no browsers or npm install required.
      - name: Unit-test perf harness logic
        run: npm run perf:test

  # Measures the PR's base commit and head (merge commit) on the SAME runner in
  # the SAME job, then compares the two runs. A committed baseline was tried
  # first and produced false positives (#62, #63): cross-run/host drift on
  # shared runners shifts every sample of a run together, which no within-run
  # statistical guard can distinguish from a real regression. Measuring both
  # sides back-to-back on one host removes that drift from the comparison.
  benchmark:
    needs: harness-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head (merge commit)
        uses: actions/checkout@v7
        with:
          path: head

      - name: Checkout PR base
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            head/package-lock.json
            base/package-lock.json

      - name: Install dependencies (base)
        working-directory: base
        run: npm ci

      - name: Install dependencies (head)
        working-directory: head
        run: npm ci

      - name: Install Playwright browsers
        working-directory: head
        run: npx playwright install --with-deps chromium

      # Base may pin a different Playwright; its install is a no-op when equal.
      - name: Install Playwright browsers (base)
        working-directory: base
        run: npx playwright install --with-deps chromium

      - name: Build library (base)
        working-directory: base
        run: npm run build:lib

      - name: Build library (head)
        working-directory: head
        run: npm run build:lib

      - name: Run benchmarks (base)
        working-directory: base
        run: npm run perf

      - name: Run benchmarks (head)
        working-directory: head
        run: npm run perf

      - name: Generate report
        working-directory: head
        run: npm run perf:report -- --output "$GITHUB_STEP_SUMMARY"

      - name: Compare head against base
        id: compare
        if: always()
        working-directory: head
        run: |
          # Capture perf:compare's real exit code (a pipe would mask it) so the
          # gate below can actually fail the build on a regression / bad run.
          npm run --silent perf:compare -- \
            --baseline ../base/perf/results/latest.json 2>&1 | tee perf/results/comparison.txt
          status=${PIPESTATUS[0]}
          cat perf/results/comparison.txt >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -eq 0 ]; then
            echo "regression=false" >> "$GITHUB_OUTPUT"
          else
            echo "regression=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const { readFileSync, existsSync } = require('fs');
            const { execSync } = require('child_process');

            const report = execSync('npm run --silent perf:report', {
              encoding: 'utf-8',
              cwd: 'head',
            });

            let comparison = '';
            const compPath = 'head/perf/results/comparison.txt';
            if (existsSync(compPath)) {
              comparison = '\n---\n' + readFileSync(compPath, 'utf-8');
            }

            // Find and update existing comment, or create a new one
            const marker = '<!-- perf-benchmark-results -->';
            const body = `${marker}\n${report}${comparison}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results
          path: |
            head/perf/results/
            base/perf/results/
          retention-days: 30

      # Runs last so the PR comment and artifact upload still happen, but the job
      # (and therefore the check) fails when a regression or bad run was found.
      - name: Enforce performance gate
        if: always() && steps.compare.outputs.regression == 'true'
        run: |
          echo "::error::Performance regression or incomparable base/head runs detected — see the comparison table."
          exit 1
