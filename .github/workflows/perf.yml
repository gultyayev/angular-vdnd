name: Performance Benchmarks

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Pure statistics / gating logic — no browsers or npm install required.
      - name: Unit-test perf harness logic
        run: npm run perf:test

  benchmark:
    if: github.event_name == 'pull_request'
    needs: harness-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Library
        run: npm run build:lib

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run performance benchmarks
        run: npm run perf

      - name: Generate report
        run: npm run perf:report -- --output "$GITHUB_STEP_SUMMARY"

      - name: Compare against baseline
        id: compare
        if: always()
        run: |
          if npm run --silent perf:compare 2>&1 | tee perf/results/comparison.txt; then
            echo "regression=false" >> "$GITHUB_OUTPUT"
          else
            echo "regression=true" >> "$GITHUB_OUTPUT"
          fi
          cat perf/results/comparison.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const { readFileSync, existsSync } = require('fs');
            const { execSync } = require('child_process');

            const report = execSync('npm run --silent perf:report', { encoding: 'utf-8' });

            let comparison = '';
            const compPath = 'perf/results/comparison.txt';
            if (existsSync(compPath)) {
              comparison = '\n---\n' + readFileSync(compPath, 'utf-8');
            }

            // Find and update existing comment, or create a new one
            const marker = '<!-- perf-benchmark-results -->';
            const body = `${marker}\n${report}${comparison}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results
          path: perf/results/
          retention-days: 30

  # Regenerate the committed baseline on the current Playwright, in the same
  # environment PRs are measured in. Triggered manually; the fresh baseline is
  # uploaded as an artifact to download and commit (avoids machine-to-machine
  # drift from regenerating locally).
  refresh-baseline:
    if: github.event_name == 'workflow_dispatch'
    needs: harness-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Library
        run: npm run build:lib

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate baseline
        run: npm run perf:baseline

      - name: Upload updated baseline
        uses: actions/upload-artifact@v7
        with:
          name: updated-baseline
          path: perf/baselines/baseline.json
          retention-days: 30
